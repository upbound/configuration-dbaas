apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xsqlinstances.dbaas.upbound.io
spec:
  group: dbaas.upbound.io
  names:
    kind: XSQLInstance
    plural: xsqlinstances
  claimNames:
    kind: SQLInstance
    plural: sqlinstances
  connectionSecretKeys:
    - username
    - password
    - host
    - port  # Azure
    - endpoint  # AWS
    - serverCACertificateCert  # GCP
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      additionalPrinterColumns:
        - name: Cloud
          type: string
          description: Cloud Environment
          jsonPath: .spec.compositionSelector.matchLabels.provider
        - name: Engine
          type: string
          description: Database Engine
          jsonPath: .spec.parameters.engine
        - name: Version
          type: string
          description: Database Engine Verion
          jsonPath: .spec.parameters.engineVersion
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    provider:
                      type: string
                      enum:
                        - aws
                        - azure
                        - gcp
                    region:
                      type: string
                      description: Region is the region you'd like your resource to be created in.
                    deletionPolicy:
                      description: Delete the external resources when the Claim/XR is deleted. Defaults to Delete
                      enum:
                        - Delete
                        - Orphan
                      type: string
                      default: Delete
                    providerConfigName:
                      description: Crossplane ProviderConfig to use for provisioning this resources
                      type: string
                      default: default
                    engine:
                      description: |
                        Database engine. Note: Engine support varies by provider:
                        - AWS: postgres, mariadb
                        - Azure: postgres, mysql
                        - GCP: postgres, mysql
                      type: string
                      enum:
                        - mariadb
                        - postgres
                        - mysql
                    engineVersion:
                      description: Database engine version
                      type: string
                    storageGB:
                      description: Database storage size in gigabytes
                      type: integer
                    passwordSecretRef:
                      type: object
                      description: "A reference to the Secret object containing database password"
                      properties:
                        namespace:
                          type: string
                        name:
                          type: string
                        key:
                          type: string
                      required:
                        - namespace
                        - name
                        - key
                  required:
                    - storageGB
                    - passwordSecretRef
                    - engine
              required:
                - parameters
